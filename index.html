<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/me.jpg" />
    <!--
      viewport-fit=cover       → extends under iOS notch/home indicator so
                                  safe-area env() values kick in.
      maximum-scale=1          → disables the pinch-zoom that causes
                                  iOS to zoom inputs on focus.
      user-scalable=no         → same reason, blocks accidental zoom on taps.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Lakshya Goyal</title>
  </head>
